<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metal Cow | Field Scouting</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <img src="../img/MCRimage3.png" class="metalcowlogo" alt="Metal Cow logo">
    <nav>
        <ul>
            <li><a href="../index.html">Login</a></li>
            <li><a href="pit.html">Pit</a></li>
            <li><a href="field.html">Field</a></li>
            <li><a href="store.html">Data</a></li>
            <li><a href="stats.html">Analytics</a></li>
        </ul> 
    </nav>
    
    <h2>Field Scouting</h2>

    <form id="fieldForm" onsubmit="sendData(event)">
        <fieldset>
            <legend>Match Info</legend>
            <div class="question">
                <label for="matchNumber">Match Number</label>
                <input type="number" id="matchNumber" name="matchNumber" required>
            </div>

            <div class="question">
                <label for="teamNumberField">Team Number</label>
                <input type="number" id="teamNumberField" name="teamNumber" required>
            </div>

            <div class="question">
                <label>Robot Status</label>
                <div class="radio-group">
                    <label class="check-inline"><input type="radio" name="status" value="Operational" checked> Operational</label>
                    <label class="check-inline"><input type="radio" name="status" value="Disabled"> Disabled</label>
                </div>
            </div>
        </fieldset>

        <fieldset>
            <legend>Autonomous Period Performance</legend>
            <div class="question">
                <label>Auto Period Actions</label>
                <label class="check-inline"><input type="checkbox" name="autoMoved"> Auto Moved?</label>
                <label class="check-inline"><input type="checkbox" name="autoScored"> Auto Scored?</label>
            </div>

            <div class="question">
                <label for="fuelPreload">Number of fuel preloaded?</label>
                <input type="number" id="fuelPreload" name="fuelPreload" min="0" max="8" required>
            </div>
        </fieldset>

        <fieldset>
            <legend>Teleop Performance</legend>
            <div class="question">
                <label for="scoreCount">Game Pieces Scored</label>
                <input type="number" id="scoreCount" name="scoreCount" value="0" min="0" max="200">
            </div>

            <div class="question">
                <label>Obstacle Navigation</label>
                <label class="check-inline"><input type="checkbox" name="overBump"> Navigated bump?</label>
                <label class="check-inline"><input type="checkbox" name="underTrench"> Navigated under trench?</label>
            </div>
        </fieldset>

        <fieldset>
            <legend>Endgame Performance</legend>
            <div class="question">
                <label>Climb Attempt</label>
                <div class="radio-group">
                    <label class="check-inline"><input type="radio" name="climbAttempt" value="Yes"> Attempted</label>
                    <label class="check-inline"><input type="radio" name="climbAttempt" value="No"> Not Attempted</label>
                </div>
            </div>

            <div class="question">
                <label>Climb Success?</label>
                <div class="radio-group">
                    <label class="check-inline"><input type="radio" name="matchClimb" value="Success"> Success</label>
                    <label class="check-inline"><input type="radio" name="matchClimb" value="Fail"> Fail</label>
                    <label class="check-inline"><input type="radio" name="matchClimb" value="N/A"> N/A</label>
                </div>
            </div>

            <div class="question">
                <label for="climbLevel">Climb Level Achieved</label>
                <select id="climbLevel" name="climbLevel">
                    <option value="None">N/A</option>
                    <option value="Level 1">Level 1</option>
                    <option value="Level 2">Level 2</option>
                    <option value="Level 3">Level 3</option>
                </select>
            </div>

            <div class="question">
                <label>Ranking Points Earned</label>
                <label class="check-inline"><input type="checkbox" name="energizedRP"> Energized RP?</label>
                <label class="check-inline"><input type="checkbox" name="superchargedRP"> Supercharged RP?</label>
            </div>
        </fieldset>

        <div class="question">
            <label for="matchNotes">Match Notes</label>
            <textarea id="matchNotes" name="matchNotes" rows="4" placeholder="Defense, driver speed, or breakages..."></textarea>
        </div>

        <button type="submit">Submit Match Data</button>
    </form>

    <script src="../js/script.js"></script>
</body>
</html>
